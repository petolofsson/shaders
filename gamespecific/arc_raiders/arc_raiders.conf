enableOnLaunch = True
toggleKey = Home

reshadeTexturePath = /home/pol/code/shaders/gamespecific/arc_raiders/shaders
reshadeIncludePath = /home/pol/code/shaders/gamespecific/arc_raiders/shaders

# ── Stable chain ──────────────────────────────────────────────────────────────
zone_contrast  = /home/pol/code/shaders/general/olofssonian-zone-contrast/olofssonian_zone_contrast.fx
chroma_lift    = /home/pol/code/shaders/general/olofssonian-chroma-lift/olofssonian_chroma_lift.fx

# ── Shared shaders (used by both chains) ──────────────────────────────────────
color_grade    = /home/pol/code/shaders/general/color-grade/olofssonian_color_grade.fx

# ── Alpha chain ───────────────────────────────────────────────────────────────
primary_correction = /home/pol/code/shaders/general/primary-correction/primary_correction.fx
frame_analysis     = /home/pol/code/shaders/general/frame-analysis/frame_analysis.fx
youvan             = /home/pol/code/shaders/general/youvan-orthonorm/youvan_orthonorm.fx
alpha_zone         = /home/pol/code/shaders/general/alpha-zone-contrast/alpha_zone_contrast.fx
alpha_chroma       = /home/pol/code/shaders/general/alpha-chroma-lift/alpha_chroma_lift.fx
pro_mist           = /home/pol/code/shaders/general/pro-mist/pro_mist.fx
output_transform   = /home/pol/code/shaders/general/output-transform/output_transform.fx
film_grain         = /home/pol/code/shaders/general/film-grain/film_grain.fx

# Switch between chains by changing the effects line:
#effects = zone_contrast:chroma_lift:color_grade
effects = primary_correction:frame_analysis:youvan:alpha_zone:alpha_chroma:output_transform
