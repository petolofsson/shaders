enableOnLaunch = True
toggleKey = Home

reshadeTexturePath = /home/pol/code/shaders/gamespecific/arc_raiders/shaders
reshadeIncludePath = /home/pol/code/shaders/gamespecific/arc_raiders/shaders

# ── ANALYSIS ──────────────────────────────────────────────────────────────────
# Builds luminance + saturation histograms each frame (LumHistTex, SatHistTex).
# No pixel output change — pure measurement. All downstream stages read from here.
frame_analysis = /home/pol/code/shaders/general/frame-analysis/frame_analysis.fx

# ── CORRECTIVE (technical normalization — game-agnostic) ──────────────────────
# Each stage has one job. Collectively they normalize the signal to a clean,
# full-range, color-accurate state. No creative decisions here.

# Range expansion: levels stretch [p5, p95] → [0, 1.0]. White balance.
# Goal: every downstream stage receives a full-range, WB-neutral signal.
primary_correction = /home/pol/code/shaders/general/primary-correction/primary_correction.fx

# Color accuracy: orthonormal matrix correction to remove hue skews and color casts.
# Goal: greys stay grey, hues sit at their correct positions.
youvan = /home/pol/code/shaders/general/youvan-orthonorm/youvan_orthonorm.fx

# Tonal range: adaptive S-curve contrast recovery anchored at scene p10/p90.
# Goal: expand compressed tonal range. Passthrough on scenes with healthy spread.
alpha_zone = /home/pol/code/shaders/general/alpha-zone-contrast/alpha_zone_contrast.fx

# Chroma range: proportional saturation recovery, scaled to scene deficit.
# Goal: expand compressed saturation. Passthrough on scenes with healthy saturation.
alpha_chroma = /home/pol/code/shaders/general/alpha-chroma-lift/alpha_chroma_lift.fx

# ── CREATIVE (intentional look) ───────────────────────────────────────────────
# First stage where aesthetic decisions are made. Chain above this line
# must be invisible on a neutral scene (grey in = grey out, no added punch).

# Film emulation / color grading presets.
color_grade = /home/pol/code/shaders/general/color-grade/olofssonian_color_grade.fx

# Optical diffusion — lens halation and glow around bright sources.
#pro_mist = /home/pol/code/shaders/general/pro-mist/pro_mist.fx

# Atmospheric lift — additive global shadow lift, physically correct (no blur).
#veil = /home/pol/code/shaders/general/veil/veil.fx

# ── DISPLAY TRANSFORM (always last) ───────────────────────────────────────────
# OpenDRT tone curve + OKLab highlight chroma compression.
# Converts scene-linear → display-referred. Nothing runs after this.
output_transform = /home/pol/code/shaders/general/output-transform/output_transform.fx

scope_pre  = /home/pol/code/shaders/general/scope/scope_pre.fx
scope      = /home/pol/code/shaders/general/scope/scope.fx

effects = frame_analysis:scope_pre:primary_correction:youvan:alpha_zone:alpha_chroma:scope
