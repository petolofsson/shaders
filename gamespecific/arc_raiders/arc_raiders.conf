enableOnLaunch = True
toggleKey = Home

reshadeTexturePath = /home/pol/code/shaders/gamespecific/arc_raiders/shaders
reshadeIncludePath = /home/pol/code/shaders/gamespecific/arc_raiders/shaders

# ── ANALYSIS ──────────────────────────────────────────────────────────────────
analysis_frame     = /home/pol/code/shaders/general/analysis-frame/analysis_frame.fx
analysis_scope_pre = /home/pol/code/shaders/general/analysis-scope/analysis_scope_pre.fx
analysis_scope     = /home/pol/code/shaders/general/analysis-scope/analysis_scope.fx

# ── CORRECTIVE ────────────────────────────────────────────────────────────────
# inverse_grade = /home/pol/code/shaders/general/inverse-grade/inverse_grade.fx  # pulled — game tone curve is better
corrective    = /home/pol/code/shaders/general/corrective/corrective.fx

# ── GRADE ─────────────────────────────────────────────────────────────────────
grade            = /home/pol/code/shaders/general/grade/grade.fx
pro_mist         = /home/pol/code/shaders/general/pro-mist/pro_mist.fx
veil             = /home/pol/code/shaders/general/veil/veil.fx          # add after pro_mist — use for games with no volumetric fog; skip if engine has its own
retinal_vignette = /home/pol/code/shaders/general/retinal-vignette/retinal_vignette.fx  # add after pro_mist — use for games with no built-in vignette; skip if engine has one

effects = analysis_frame:analysis_scope_pre:corrective:grade:pro_mist:analysis_scope
